name: TidyMind CI

on:
  push:
    branches:
      - main
      - coding/v0.1
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tidymind-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      AVALONIA_TELEMETRY_OPTOUT: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore TidyMind.sln

      - name: Build
        run: dotnet build TidyMind.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TidyMind.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults
          if-no-files-found: warn
